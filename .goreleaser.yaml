version: 2

before:
  hooks:
    - "sed -i.bak 's|/download/v[^/]*/|/download/v{{ .Version }}/|g' plugin.yaml && rm plugin.yaml.bak"
    - "sed -i.bak 's/^version: .*/version: \"{{ .Version }}\"/' plugin.yaml && rm plugin.yaml.bak"

builds:
  - id: trivy-bundle-install
    binary: trivy-bundle-install
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

archives:
  - id: trivy-bundle-install
    formats: [tar.gz]
    name_template: "trivy-bundle-install_{{ .Os }}_{{ .Arch }}"

release:
  extra_files:
    - glob: plugin.yaml
